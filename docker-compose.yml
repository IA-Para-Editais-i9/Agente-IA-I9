# Stack opcional de monitoramento (Langfuse self-hosted).
#
# Por padrao NADA sobe — o profile `monitoring` precisa ser ativado:
#   docker compose --profile monitoring up -d
#
# Apos subir, abra http://localhost:3000 e crie a primeira conta.
# As chaves (LANGFUSE_PUBLIC_KEY/SECRET_KEY) sao geradas dentro da UI e
# devem ser colocadas no `.env` do projeto.
#
# Para derrubar: docker compose --profile monitoring down
# Para limpar dados:  docker compose --profile monitoring down -v

services:
  langfuse-db:
    image: postgres:15-alpine
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      SALT: change-me-in-production
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_NAME: i9-plus
      LANGFUSE_INIT_PROJECT_NAME: agente-editais
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  langfuse-db-data:
